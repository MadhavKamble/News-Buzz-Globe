name: news_buzz_globe
version: "1.0.0"
profile: news_buzz_globe

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]

clean-targets: ["target", "dbt_packages"]

vars:
  # Buzz-intensity formula parameters (mirror ingestion/config.py defaults).
  w_articles: 0.4
  w_sources: 0.3
  w_recency: 0.3
  articles_cap: 100
  sources_cap: 25
  half_life_hours: 6

models:
  news_buzz_globe:
    staging:
      +materialized: view
    marts:
      +materialized: table
